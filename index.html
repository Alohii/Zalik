<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مذاكرة الاختبار — Marine Machinery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1B2B; --panel:#122639; --panel2:#0F2031; --line:#1E3650;
  --ink:#E8EEF4; --muted:#7E94A8; --accent:#FFC857; --accent-ink:#1A1402;
  --good:#4ADE80; --bad:#F87171; --warn:#FBBF24;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;min-height:100vh;line-height:1.7}
.en{font-family:'IBM Plex Mono',monospace;direction:ltr;unicode-bidi:embed}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 60px}
header.top{display:flex;align-items:center;justify-content:space-between;padding:14px 0 22px;border-bottom:1px solid var(--line);margin-bottom:22px}
.brand{font-weight:700;font-size:18px}
.brand small{display:block;color:var(--muted);font-weight:400;font-size:12px;letter-spacing:.5px}
.tagchip{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:3px 8px;direction:ltr}

/* nameplate cards */
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 16px 14px;cursor:pointer;transition:transform .12s, border-color .12s}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card::before,.card::after,
.card .b1::before,.card .b1::after{content:'';position:absolute;width:6px;height:6px;border-radius:50%;background:var(--line)}
.card::before{top:8px;right:8px}.card::after{top:8px;left:8px}
.card .b1::before{bottom:8px;right:8px}.card .b1::after{bottom:8px;left:8px}
.card h3{font-size:16px;margin-bottom:2px}
.card .sub{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:right}
.card .meta{margin-top:10px;font-size:12px;color:var(--muted);display:flex;gap:10px;align-items:center}
.badge{font-size:11px;padding:1px 8px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
.badge.done{border-color:var(--good);color:var(--good)}
.badge.half{border-color:var(--warn);color:var(--warn)}

/* topic view */
.backbtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:13px;margin-bottom:16px}
.backbtn:hover{color:var(--ink);border-color:var(--muted)}
h2.topic-title{font-size:22px;margin-bottom:2px}
.topic-sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500}
.tab.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:700}

/* MCQ */
.qcount{font-size:12px;color:var(--muted);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:right}
.qbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
.qtext{font-size:17px;font-weight:700;margin-bottom:16px}
.opt{display:block;width:100%;text-align:right;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-family:inherit;font-size:15px;transition:border-color .1s}
.opt:hover{border-color:var(--accent)}
.opt.correct{border-color:var(--good);background:rgba(74,222,128,.1)}
.opt.wrong{border-color:var(--bad);background:rgba(248,113,113,.1)}
.opt:disabled{cursor:default;opacity:.85}
.nextbtn,.primary{background:var(--accent);color:var(--accent-ink);border:none;border-radius:8px;padding:11px 26px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer}
.nextbtn:hover,.primary:hover{filter:brightness(1.08)}
.ghost{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:10px 20px;font-family:inherit;font-size:14px;cursor:pointer}
.scorebox{text-align:center;padding:30px 16px}
.scorebox .big{font-size:44px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--accent)}
.fb{font-size:13px;margin-top:6px}
.fb.good{color:var(--good)} .fb.bad{color:var(--bad)}

/* write mode */
.hint{font-size:13px;color:var(--muted);margin-bottom:12px;background:var(--panel2);border:1px dashed var(--line);border-radius:8px;padding:10px 14px}
textarea{width:100%;min-height:180px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:14px;padding:12px;resize:vertical;direction:ltr}
textarea:focus,input:focus{outline:2px solid var(--accent);outline-offset:1px}
.factrow{margin-bottom:12px}
.factrow label{display:block;font-size:14px;font-weight:500;margin-bottom:4px}
.factrow input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:14px;padding:10px 12px;direction:ltr}
.actions{display:flex;gap:10px;margin-top:14px}
.result-item{display:flex;gap:10px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:14px}
.result-item .mark{font-size:16px;line-height:1.4}
.result-item.ok{border-color:rgba(74,222,128,.4)}
.result-item.miss{border-color:rgba(248,113,113,.4)}
.result-item.order{border-color:rgba(251,191,36,.4)}
.result-item .what{flex:1}
.result-item .you{color:var(--muted);font-size:12px;display:block}
.summary{margin:14px 0;padding:14px;border-radius:8px;background:var(--panel);border:1px solid var(--line);font-size:15px;font-weight:700;text-align:center}
.summary .en{color:var(--accent)}

/* ordering stage */
.slotlist{margin-bottom:16px}
.slot{display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px dashed var(--line);border-radius:8px;padding:9px 12px;margin-bottom:6px;min-height:42px;font-size:14px}
.slot .num{font-family:'IBM Plex Mono',monospace;color:var(--accent);min-width:22px;text-align:center}
.slot.filled{border-style:solid}
.slot.s-ok{border-color:var(--good)}
.slot.s-bad{border-color:var(--bad)}
.slot .undo{margin-inline-start:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px}
.pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{background:var(--panel);border:1px solid var(--accent);color:var(--ink);border-radius:8px;padding:9px 13px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;direction:ltr}
.chip:hover{background:var(--accent);color:var(--accent-ink)}
.poollabel{font-size:13px;color:var(--muted);margin-bottom:8px}

/* image labeling stage */
.imgwrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);margin-bottom:14px}
.imgwrap img{width:100%;display:block}
.blank{position:absolute;background:#fff;border:2px solid #2563EB;border-radius:6px;color:#0B1B2B;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:clamp(8px,1.6vw,13px);padding:0 2px;white-space:nowrap;direction:ltr}
.blank.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,200,87,.5)}
.blank.l-ok{border-color:var(--good);background:#E8FBEF}
.blank.l-bad{border-color:var(--bad);background:#FDECEC;flex-direction:column;line-height:1.1}
.blank .fix{color:#15803D;font-size:clamp(7px,1.4vw,11px)}
.bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.sechead{margin:6px 0 12px;font-size:16px;color:var(--accent);font-weight:700}
.grid+.sechead{margin-top:26px}
</style>
</head>

</div>

/* ============== MCQ GENERATION ============== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pick(arr,n,exclude){const pool=arr.filter(x=>x!==exclude);return shuffle(pool).slice(0,n)}

function buildMCQ(t){
  const qs=[];
  if(t.type==='ordered'){
    const texts=t.items.map(i=>i.en);
    t.items.forEach((it,i)=>{
      qs.push({q:`وش الخطوة رقم ${i+1}؟`, correct:it.en, opts:shuffle([it.en,...pick(texts,3,it.en)])});
    });
    for(let i=0;i<t.items.length-1;i++){
      if(Math.random()<0.6) continue;
      const nxt=t.items[i+1].en;
      qs.push({q:`وش الخطوة اللي تجي بعد:`, qen:t.items[i].en, correct:nxt, opts:shuffle([nxt,...pick(texts,3,nxt)])});
    }
  }
  else if(t.type==='ordered-parts'){
    const texts=t.items.map(i=>i.en);
    for(let i=0;i<t.items.length-1;i++){
      const nxt=t.items[i+1].en;
      qs.push({q:`وش الجزء اللي تحت هذا مباشرة (من فوق لتحت)؟`, qen:t.items[i].en, correct:nxt, opts:shuffle([nxt,...pick(texts,3,nxt)])});
    }
    qs.push({q:'وش أول جزء من فوق؟', correct:t.items[0].en, opts:shuffle([t.items[0].en,...pick(texts,3,t.items[0].en)])});
    qs.push({q:'وش آخر جزء تحت؟', correct:t.items[t.items.length-1].en, opts:shuffle([t.items[t.items.length-1].en,...pick(texts,3,t.items[t.items.length-1].en)])});
  }
  else if(t.type==='parts'){
    const reals=t.items.map(i=>i.en);
    const nm=t.pname||'أجزاء ضاغط الهواء';
    const fakePool=(t.fakes||FAKE_PARTS).filter(f=>!reals.includes(f));
    shuffle(t.items).slice(0,6).forEach(it=>{
      qs.push({q:`أي من التالي من ${nm}؟`, correct:it.en, opts:shuffle([it.en,...pick(fakePool,3,null)])});
    });
    for(let k=0;k<3;k++){
      const fake=pick(fakePool,1,null)[0];
      qs.push({q:`أي من التالي ليس من ${nm}؟`, correct:fake, opts:shuffle([fake,...pick(reals,3,null)])});
    }
  }
  else if(t.type==='facts'){
    if(t.id==='engine'){
      qs.push({q:'وش موديل المكينة الرئيسية؟', correct:'Caterpillar C32', opts:shuffle(['Caterpillar C32','Caterpillar C18','Caterpillar 3512','MAN B&W 6S50'])});
      qs.push({q:'كم عدد المكاين الرئيسية؟', correct:'2', opts:shuffle(['2','1','3','4'])});
      qs.push({q:'وش نوع الشحن؟', correct:'Turbocharged', opts:shuffle(['Turbocharged','Naturally aspirated','Supercharged','Two-stage intercooled'])});
      qs.push({q:'كم قدرة المكينة (Power)؟', correct:'380 kW', opts:shuffle(['380 kW','340 kW','420 kW','500 kW'])});
      qs.push({q:'كم سرعة المكينة (Speed)؟', correct:'1900 RPM', opts:shuffle(['1900 RPM','1500 RPM','1800 RPM','2200 RPM'])});
    } else if(t.id==='edg'){
      qs.push({q:'كيف يبدأ تشغيل مولد الطوارئ (E.D.G)؟', correct:'Electric motor + Batteries', opts:shuffle(['Electric motor + Batteries','Compressed air','Hydraulic starter','Hand crank'])});
      qs.push({q:'وين موقع مولد الطوارئ؟', correct:'On deck', opts:shuffle(['On deck','Engine room','Double bottom','Steering gear room'])});
    } else {
      t.items.forEach(it=>{
        if(it.distract) qs.push({q:it.q, correct:it.mc||it.en, opts:shuffle([it.mc||it.en,...it.distract.slice(0,3)])});
      });
    }
  }
  return shuffle(qs);
}

/* ============== MATCHING (write mode) ============== */
function norm(s){return s.toLowerCase().replace(/[.,;:()\-–_/\\]+/g,' ').replace(/\s+/g,' ').trim()}
function hits(line,it){
  let h=0;
  it.kw.forEach(k=>{ if(line.includes(k)) h++; });
  if(it.extra) it.extra.forEach(k=>{ if(line.includes(k)) h+=0.5; });
  return h;
}
function checkLines(text,items){
  const lines=text.split('\n').map(norm).filter(l=>l.length>0);
  const matched=new Array(items.length).fill(null); // index -> line order position
  lines.forEach((line,li)=>{
    let best=-1,bestScore=0;
    items.forEach((it,ii)=>{
      if(matched[ii]!==null) return;
      const s=hits(line,it);
      if(s>bestScore){bestScore=s;best=ii}
    });
    if(best>=0 && bestScore>=1) matched[best]={pos:li,line:lines[li]};
  });
  return matched;
}

  else if(cur.type==='ordered'||cur.type==='ordered-parts'){ mode='order'; startOrder(); }

}
const AR_NUM=['١','٢','٣','٤'];
function topicShell(inner){
  const hasOrder = cur.type==='ordered'||cur.type==='ordered-parts';
  const hasLabel = !!LABEL_DATA[cur.id];

  if(hasLabel) tabs.push({m:'label',label:'الصورة',fn:'startLabel()'});

    </div>

}

/* ---- IMAGE LABEL STAGE ---- */
let lbl=null;
function startLabel(){
  const d=LABEL_DATA[cur.id];
  lbl={fills:new Array(d.blanks.length).fill(null), sel:0, checked:false, bank:shuffle(d.blanks.map(b=>b.ans))};
  renderLabel();
}
function renderLabel(){
  const d=LABEL_DATA[cur.id];
  const blanks=d.blanks.map((b,i)=>{
    const f=lbl.fills[i];
    let cls='blank', content=f||(i+1);
    if(lbl.checked){
      if(f===b.ans) cls+=' l-ok';
      else { cls+=' l-bad'; content=`<span>${f||'—'}</span><span class="fix">✓ ${b.ans}</span>`; }
    } else if(i===lbl.sel && !f) cls+=' sel';
    return `<div class="${cls}" style="left:${b.l}%;top:${b.t}%;width:${b.w}%;height:${b.h}%" onclick="tapBlank(${i})">${content}</div>`;
  }).join('');
  const allFilled=lbl.fills.every(f=>f);
  topicShell(`
    <div class="hint">${lbl.checked?'الأخضر صح ✓ والأحمر تحته الإجابة الصحيحة':'اضغط رقم الفراغ في الصورة، وبعدها اختر الاسم الصحيح من تحت. (اضغط فراغ معبّأ عشان تفضيه)'}</div>
    <div class="imgwrap"><img src="${d.img}" alt="">${blanks}</div>
    ${!lbl.checked&&lbl.bank.length?`<div class="poollabel">بنك الأسماء:</div><div class="bank">${lbl.bank.map((w,i)=>`<button class="chip" onclick="fillWord(${i})">${w}</button>`).join('')}</div>`:''}
    <div class="actions">
      ${!lbl.checked&&allFilled?`<button class="primary" onclick="checkLabel()">صحّح ✓</button>`:''}
      <button class="ghost" onclick="startLabel()">إعادة ↻</button>
    </div>
    <div id="res"></div>`);
}
function tapBlank(i){
  if(lbl.checked) return;
  if(lbl.fills[i]){ lbl.bank.push(lbl.fills[i]); lbl.fills[i]=null; lbl.sel=i; }
  else lbl.sel=i;
  renderLabel();
}
function fillWord(i){
  const w=lbl.bank[i];
  if(lbl.fills[lbl.sel]) return;
  lbl.fills[lbl.sel]=w; lbl.bank.splice(i,1);
  const next=lbl.fills.findIndex(f=>!f);
  if(next>=0) lbl.sel=next;
  renderLabel();
}
function checkLabel(){
  const d=LABEL_DATA[cur.id];
  lbl.checked=true;
  let score=0;
  d.blanks.forEach((b,i)=>{ if(lbl.fills[i]===b.ans) score++; });
  renderLabel();
  const pct=Math.round(score/d.blanks.length*100);
  progress[cur.id]={...(progress[cur.id]||{}),label:pct};
  document.getElementById('res').innerHTML=`
    <div class="summary">النتيجة: <span class="en">${score} / ${d.blanks.length}</span> — ${pct===100?'كامل! 🏆 انتقل للمرحلة الجاية':'أعدها لين تضبط كلها'}</div>
    ${pct===100?`<div class="actions"><button class="primary" onclick="${cur.type==='ordered-parts'?"mode='order';startOrder()":"mode='mcq';startMCQ()"}">المرحلة الجاية ←</button></div>`:''}`;
}

/* ---- ORDER STAGE ---- */
let pool=[], placed=[];
function startOrder(){
  pool=shuffle(cur.items.map(i=>i.en));
  placed=[];
  renderOrder();
}
function renderOrder(){
  const total=cur.items.length;
  let slots='';
  for(let i=0;i<total;i++){
    const p=placed[i];
    slots+=`<div class="slot ${p?'filled':''}"><span class="num">${i+1}</span>
      <span class="en">${p||'—'}</span>
      ${p&&i===placed.length-1?`<button class="undo" onclick="undoPlace()" title="تراجع">↩</button>`:''}</div>`;
  }
  const lbl = cur.type==='ordered-parts' ? 'اضغط الأجزاء بالترتيب من فوق لتحت:' : 'اضغط الخطوات بترتيبها الصحيح:';
  topicShell(`
    <div class="hint">${lbl}</div>
    <div class="slotlist">${slots}</div>
    ${pool.length?`<div class="poollabel">الباقي:</div><div class="pool">${pool.map((p,i)=>`<button class="chip" onclick="place(${i})">${p}</button>`).join('')}</div>`:''}
    ${!pool.length?`<div class="actions"><button class="primary" onclick="checkOrder()">صحّح الترتيب ✓</button><button class="ghost" onclick="startOrder()">إعادة ↻</button></div>`:''}
    <div id="res"></div>`);
}
function place(i){ placed.push(pool[i]); pool.splice(i,1); renderOrder(); }
function undoPlace(){ const last=placed.pop(); pool.push(last); renderOrder(); }
function checkOrder(){
  let score=0;
  const slots=document.querySelectorAll('.slot');
  cur.items.forEach((it,i)=>{
    const ok=placed[i]===it.en;
    if(ok)score++;
    slots[i].classList.add(ok?'s-ok':'s-bad');
    if(!ok) slots[i].innerHTML+=` <span style="color:var(--good);font-size:12px" class="en">→ ${it.en}</span>`;
  });
  const pct=Math.round(score/cur.items.length*100);
  progress[cur.id]={...(progress[cur.id]||{}),order:pct};
  const msg = pct===100?'ترتيب كامل! ✨ انتقل للاختيارات':'الأخضر صح، الأحمر مكانه غلط — أعدها لين تضبط';
  document.getElementById('res').innerHTML=`
    <div class="summary">الترتيب: <span class="en">${score} / ${cur.items.length}</span> — ${msg}</div>
    <div class="actions">
      ${pct===100?`<button class="primary" onclick="mode='mcq';startMCQ()">المرحلة ٢ — اختيارات ←</button>`:''}
      <button class="ghost" onclick="startOrder()">إعادة ↻</button>
    </div>`;
}

/* ---- MCQ ---- */
function startMCQ(){ mcq=buildMCQ(cur); mcqIdx=0; mcqScore=0; renderQ(); }
function renderQ(){
  if(mcqIdx>=mcq.length){
    const pct=Math.round(mcqScore/mcq.length*100);
    progress[cur.id]={...(progress[cur.id]||{}),mcq:pct};

        <button class="primary" onclick="mode='write';renderWrite()">اكتب من ذاكرتك ✍️</button>
        <button class="ghost" onclick="startMCQ()">إعادة الاختيارات ↻</button>
      </div></div>`);
    return;
  }
  const q=mcq[mcqIdx];
  topicShell(`
    <div class="qcount">Q ${mcqIdx+1} / ${mcq.length}</div>
    <div class="qbox">
      <div class="qtext">${q.q}${q.qen?` <span class="en" style="color:var(--accent)">${q.qen}</span>`:''}</div>
      <div id="opts">${q.opts.map((o,i)=>`<button class="opt en" style="text-align:left" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div id="fb"></div>
    </div>`);
}
function answer(i){
  const q=mcq[mcqIdx];
  const btns=document.querySelectorAll('#opts .opt');
  btns.forEach(b=>b.disabled=true);
  const chosen=q.opts[i];
  btns.forEach((b,bi)=>{ if(q.opts[bi]===q.correct) b.classList.add('correct'); });
  const fb=document.getElementById('fb');
  if(chosen===q.correct){ mcqScore++; fb.innerHTML='<div class="fb good">✓ صح عليك</div>'; }
  else{ btns[i].classList.add('wrong'); fb.innerHTML='<div class="fb bad">✗ غلط — الإجابة الصح معلّمة بالأخضر</div>'; }
  fb.innerHTML+=`<div style="margin-top:12px"><button class="nextbtn" onclick="mcqIdx++;renderQ()">${mcqIdx+1>=mcq.length?'النتيجة':'التالي ←'}</button></div>`;
}

  });
  showResult(score,cur.items.length,h,false);

function checkWrite(){
  const matched=checkLines(document.getElementById('ta').value,cur.items);
  const isOrdered=cur.type!=='parts';
  let score=0,h='',lastPos=-1,orderOK=true;
  cur.items.forEach((it,i)=>{

    if(m){
      score++;
      let cls='ok',mark='✅',note='';
      if(isOrdered){
        if(m.pos<lastPos){cls='order';mark='⚠️';note='<span class="you">موجودة بس بمكان غلط بالترتيب</span>';orderOK=false;}

      h+=`<div class="result-item ${cls}"><span class="mark">${mark}</span>
          <span class="what"><span class="en">${it.en}</span>${note}</span></div>`;
    } else {
      h+=`<div class="result-item miss"><span class="mark">❌</span>
          <span class="what">نسيت: <span class="en" style="color:var(--bad)">${it.en}</span></span></div>`;
    }
  });
  showResult(score,cur.items.length,h,isOrdered&&!orderOK);
}
function showResult(score,total,h,orderProblem){
  const pct=Math.round(score/total*100);
  progress[cur.id]={...(progress[cur.id]||{}),write:pct};
  let msg = pct===100 ? (orderProblem?'كلها صح بس راجع الترتيب ⚠️':'كامل العلامة! جاهز للاختبار 🏆')
          : pct>=70 ? 'قريب! راجع اللي نسيته وحاول مرة ثانية'
          : 'ارجع لمرحلة الاختيارات وذاكرها مرة ثانية';
  document.getElementById('res').innerHTML=`
    <div class="summary">النتيجة: <span class="en">${score} / ${total}</span> — ${msg}</div>${h}
    <div class="actions"><button class="ghost" onclick="renderWrite()">حاول مرة ثانية ↻</button></div>`;
  document.getElementById('res').scrollIntoView({behavior:'smooth'});
}

home();
</script>
</body>
